name: Discover Drive Contratos folders

# Lista as subpastas da pasta Contratos no Google Drive.
# Requer secrets: GMAIL_OAUTH_JSON e GMAIL_TOKEN_JSON
on:
  workflow_dispatch:

jobs:
  discover:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package
        run: pip install .

      - name: Prepare Google credentials
        env:
          GMAIL_OAUTH_JSON: ${{ secrets.GMAIL_OAUTH_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GMAIL_OAUTH_JSON" > credentials/gmail-oauth.json
          printf '%s' "$GMAIL_TOKEN_JSON" > credentials/gmail-token.json

      - name: Discover Contratos folder tree
        env:
          DRIVE_TREE_MAX_DEPTH: "3"
        run: python scripts/discover-drive-contratos-folders.py

      - name: Upload folder tree
        uses: actions/upload-artifact@v4
        with:
          name: drive-contratos-folders
          path: artifacts/drive-contratos-folders.json
          retention-days: 7
