name: Bootstrap contratos GCP (secrets + deploy)

# Um clique: sobe secrets do GitHub → Secret Manager e publica Cloud Run.
# Requer secret GCP_SA_KEY (JSON da service account com permissões no projeto).
on:
  workflow_dispatch:
    inputs:
      project_id:
        description: "ID do projeto GCP"
        required: true
        type: string
        default: "b4a-prj-integration-prd"
      region:
        description: "Região Cloud Run"
        required: false
        type: string
        default: "southamerica-east1"
      skip_deploy:
        description: "Somente secrets (não faz deploy)"
        required: false
        type: boolean
        default: false

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    timeout-minutes: 35

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate GitHub secrets
        env:
          GCP_SA_KEY: ${{ secrets.GCP_SA_KEY }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          AUTENTIQUE_API_TOKEN: ${{ secrets.AUTENTIQUE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_OAUTH_JSON: ${{ secrets.GMAIL_OAUTH_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          missing=()
          for name in GCP_SA_KEY MONDAY_API_TOKEN AUTENTIQUE_API_TOKEN GEMINI_API_KEY GMAIL_OAUTH_JSON GMAIL_TOKEN_JSON; do
            if [ -z "${!name}" ]; then
              missing+=("$name")
            fi
          done
          if [ "${#missing[@]}" -gt 0 ]; then
            echo "Secrets ausentes no GitHub Actions:" >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload secrets to Secret Manager
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          AUTENTIQUE_API_TOKEN: ${{ secrets.AUTENTIQUE_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GMAIL_OAUTH_JSON: ${{ secrets.GMAIL_OAUTH_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: bash scripts/setup-integration-prd-secrets.sh

      - name: Deploy Cloud Run
        if: ${{ inputs.skip_deploy != true }}
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          REGION: ${{ inputs.region }}
        run: bash scripts/deploy-contratos-cloud-run.sh

      - name: Print service URL
        if: ${{ inputs.skip_deploy != true }}
        env:
          PROJECT_ID: ${{ inputs.project_id }}
          REGION: ${{ inputs.region }}
        run: |
          URL="$(gcloud run services describe contratos-webhook \
            --region="${REGION}" \
            --project="${PROJECT_ID}" \
            --format='value(status.url)')"
          {
            echo "## Cloud Run publicado"
            echo ""
            echo "**URL do serviço:** ${URL}"
            echo ""
            echo "**Webhook Autentique:**"
            echo "\`${URL}/webhooks/autentique\`"
            echo ""
            echo "**Webhook Monday:**"
            echo "\`${URL}/webhooks/monday\`"
          } >> "$GITHUB_STEP_SUMMARY"
          echo "SERVICE_URL=${URL}" >> "$GITHUB_ENV"
