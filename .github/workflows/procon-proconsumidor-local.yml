name: Proconsumidor local processing

on:
  workflow_dispatch:
    inputs:
      max_results:
        description: "Máximo de e-mails não lidos"
        required: false
        default: "20"

jobs:
  process:
    runs-on: self-hosted
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install -e ".[dev]"
          playwright install chromium

      - name: Configure Google credentials
        env:
          GMAIL_OAUTH_JSON: ${{ secrets.GMAIL_OAUTH_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GMAIL_OAUTH_JSON" > credentials/gmail-oauth.json
          printf '%s' "$GMAIL_TOKEN_JSON" > credentials/gmail-token.json

      - name: Check Proconsumidor portal access
        run: |
          STATUS="$(curl -s -o /dev/null -w "%{http_code}" https://proconsumidor.mj.gov.br/)"
          echo "HTTP status: ${STATUS}"
          if [ "${STATUS}" = "403" ]; then
            echo "ERRO: runner self-hosted ainda bloqueado pelo portal (403)."
            exit 1
          fi

      - name: Process Proconsumidor complaints
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: >
          python -m classificacao_procons.cli process
          --sources proconsumidor
          --max-results ${{ inputs.max_results }}
