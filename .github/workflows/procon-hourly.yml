name: Procon hourly processing

on:
  schedule:
    # A cada hora (UTC)
    - cron: "0 * * * *"
  workflow_dispatch:
    inputs:
      register_monday_access_code:
        description: "Opcional — cadastrar caso no Monday pelo código do portal"
        required: false
        type: string
      elaborate_monday_item_id:
        description: "Opcional — elaborar defesa de um item específico do Monday"
        required: false
        type: string

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Restore pipeline state
        uses: actions/cache/restore@v4
        with:
          path: data
          key: procon-pipeline-state-v1

      - name: Prepare state directory
        run: |
          mkdir -p data
          python3 <<'PY'
          import json
          from pathlib import Path

          for filename, label in (
              ("processed-protocols.json", "protocolos processados"),
              ("elaborated-responses.json", "respostas elaboradas"),
          ):
              path = Path("data") / filename
              if not path.exists():
                  print(f"Estado: {label} — vazio (primeira execução ou cache expirado)")
                  continue
              try:
                  payload = json.loads(path.read_text(encoding="utf-8"))
              except json.JSONDecodeError:
                  print(f"Estado: {label} — arquivo inválido, será recriado")
                  continue
              keys = ("protocols", "monday_item_ids")
              for key in keys:
                  if key in payload:
                      print(f"Estado: {label} — {len(payload[key])} registro(s)")
          PY

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          pip install .
          pip install playwright
          playwright install chromium --with-deps

      - name: Configure Google credentials
        env:
          GMAIL_OAUTH_JSON: ${{ secrets.GMAIL_OAUTH_JSON }}
          GMAIL_TOKEN_JSON: ${{ secrets.GMAIL_TOKEN_JSON }}
        run: |
          mkdir -p credentials
          printf '%s' "$GMAIL_OAUTH_JSON" > credentials/gmail-oauth.json
          printf '%s' "$GMAIL_TOKEN_JSON" > credentials/gmail-token.json

      - name: Validate Google credentials
        run: |
          python3 <<'PY'
          import json
          import sys
          from pathlib import Path

          required_scopes = {
              "https://www.googleapis.com/auth/gmail.readonly",
              "https://www.googleapis.com/auth/drive.file",
              "https://www.googleapis.com/auth/drive.readonly",
          }

          for filename in ("gmail-oauth.json", "gmail-token.json"):
              path = Path("credentials") / filename
              if not path.exists() or path.stat().st_size < 10:
                  print(f"ERRO: {filename} vazio ou ausente. Verifique os secrets no GitHub.")
                  sys.exit(1)
              try:
                  json.loads(path.read_text())
              except json.JSONDecodeError:
                  print(f"ERRO: {filename} não é um JSON válido.")
                  sys.exit(1)

          token = json.loads(Path("credentials/gmail-token.json").read_text())
          scopes = set(token.get("scopes", []))
          missing = required_scopes - scopes
          if missing:
              print("ERRO: token sem permissões necessárias. Rode Setup Google token de novo.")
              sys.exit(1)

          from classificacao_procons.google_auth import has_valid_token

          if not has_valid_token():
              print("ERRO: token inválido ou expirado. Rode Setup Google token de novo.")
              sys.exit(1)
          print("Credenciais Google OK.")
          PY

      - name: Validate Gemini model
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_MODEL: ${{ secrets.GEMINI_MODEL }}
        run: |
          python3 <<'PY'
          import os
          import sys

          from classificacao_procons.gemini.client import (
              get_model_from_env,
              list_generate_content_models,
              resolve_gemini_model,
          )

          api_key = os.environ.get("GEMINI_API_KEY", "").strip()
          if not api_key:
              print("ERRO: GEMINI_API_KEY não configurada.")
              sys.exit(1)

          available = list_generate_content_models(api_key=api_key)
          preferred = get_model_from_env()
          selected = resolve_gemini_model(
              available_models=available,
              preferred=preferred,
          )
          print(f"Modelos Gemini disponíveis: {len(available)}")
          print(f"Modelo selecionado: {selected}")
          if preferred and preferred != selected:
              print(
                  f"Aviso: GEMINI_MODEL={preferred} indisponível; "
                  f"usando {selected}."
              )
          PY

      - name: Process Procon complaints
        id: process
        continue-on-error: true
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: python -m classificacao_procons.cli process --max-results 20

      - name: Elaborate Procon responses
        if: always()
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m classificacao_procons.cli elaborate --max-results 50 --max-items-scanned 100

      - name: Register Monday item (manual recovery)
        if: ${{ inputs.register_monday_access_code != '' }}
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
        run: >
          python -m classificacao_procons.cli register-monday
          --access-code "${{ inputs.register_monday_access_code }}"

      - name: Elaborate Monday item (manual recovery)
        if: ${{ inputs.elaborate_monday_item_id != '' }}
        env:
          MONDAY_API_TOKEN: ${{ secrets.MONDAY_API_TOKEN }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: >
          python -m classificacao_procons.cli elaborate
          --item-id "${{ inputs.elaborate_monday_item_id }}"
          --force

      - name: Save pipeline state
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data
          key: procon-pipeline-state-v1
